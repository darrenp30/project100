  <!-- Cairn (subtle summit marker) -->
  <circle cx="330" cy="200" r="6" fill="#F5F3EE"/>
  <circle cx="330" cy="190" r="4" fill="#F5F3EE"/>
  <circle cx="330" cy="182" r="3" fill="#F5F3EE"/>

</svg>