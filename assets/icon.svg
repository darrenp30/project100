<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" fill="#F5F3EE"/>

  <!-- Mountain -->
  <path d="M80 380
           L190 250
           L260 310
           L330 200
           L432 380
           Z"
        fill="#23374D"/>

  <!-- Secondary ridge -->
  <path d="M120 380
           L210 290
           L260 340
           L320 260
           L390 380
           Z"
        fill="#355070"
